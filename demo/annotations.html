<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@ponchia/ui — annotation specimen</title>
    <meta
      name="description"
      content="SVG annotation specimen for @ponchia/ui annotations CSS and geometry helpers."
    />
    <link rel="stylesheet" href="../dist/bronto.css" />
    <link rel="stylesheet" href="../dist/css/report.css" />
    <link rel="stylesheet" href="../dist/css/dataviz.css" />
    <link rel="stylesheet" href="../dist/css/annotations.css" />
    <style>
      body {
        margin: 0;
      }

      .annotation-demo {
        margin: 0 auto;
        max-width: 1180px;
        padding: 2rem 1rem 4rem;
      }

      .annotation-demo__lede {
        max-width: 72ch;
      }

      .annotation-demo__examples {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 28rem), 1fr));
      }

      .annotation-applied,
      .annotation-specimen {
        display: block;
        height: auto;
        inline-size: 100%;
      }

      .annotation-specimen-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .annotation-specimen__panel {
        fill: var(--panel-soft);
        stroke: var(--line);
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
      }

      .annotation-specimen__grid {
        stroke: var(--line);
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
      }

      .annotation-specimen__axis {
        stroke: var(--text-dim);
        stroke-width: 1.5;
        vector-effect: non-scaling-stroke;
      }

      .annotation-specimen__data {
        fill: var(--chart-color);
        opacity: 0.88;
      }

      .annotation-specimen__line {
        fill: none;
        stroke: var(--text-soft);
        stroke-width: 1.5;
        vector-effect: non-scaling-stroke;
      }

      @media (max-width: 720px) {
        .annotation-demo {
          padding-inline: 0.5rem;
        }

        .annotation-specimen {
          min-inline-size: 920px;
        }
      }
    </style>
  </head>
