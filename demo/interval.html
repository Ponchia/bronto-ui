<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>@ponchia/ui — interval specimen</title>
    <meta
      name="description"
      content="Low/high uncertainty interval specimen for @ponchia/ui interval CSS."
    />
    <link rel="stylesheet" href="../dist/bronto.css" />
    <link rel="stylesheet" href="../dist/css/interval.css" />
    <style>
      body {
        margin: 0;
      }

      .interval-demo {
        display: grid;
        gap: var(--space-md);
        margin-inline: auto;
        max-inline-size: 46rem;
        padding: 2rem 1rem 4rem;
      }

      .interval-demo__list {
        display: grid;
        gap: var(--space-md);
      }
    </style>
  </head>
  <body>
    <main class="interval-demo">
      <h1 class="ui-display">Interval specimen</h1>

      <div class="interval-demo__list">
        <div
          class="ui-interval"
          style="--lo: 0.22; --hi: 0.68"
          role="img"
          aria-label="Completion estimate between 22 and 68 percent, point estimate 52 percent"
        >
          <span class="ui-interval__label">Completion estimate</span>
          <span class="ui-interval__track" aria-hidden="true">
            <span class="ui-interval__range"></span>
            <span class="ui-interval__point" style="--v: 0.52"></span>
          </span>
          <span class="ui-interval__bounds" aria-hidden="true">
            <span>22%</span>
            <span>68%</span>
          </span>
        </div>

        <div
          class="ui-interval"
          style="--lo: 0.42; --hi: 0.86"
          role="img"
          aria-label="Observed quality window between 42 and 86 percent"
        >
          <span class="ui-interval__label">Quality window</span>
          <span class="ui-interval__track" aria-hidden="true">
            <span class="ui-interval__range"></span>
          </span>
          <span class="ui-interval__bounds" aria-hidden="true">
            <span>42%</span>
            <span>86%</span>
          </span>
        </div>

        <div
          class="ui-interval"
          style="--lo: 0.08; --hi: 0.24"
          role="img"
          aria-label="Residual risk between 8 and 24 percent, point estimate 14 percent"
        >
          <span class="ui-interval__label">Residual risk</span>
          <span class="ui-interval__track" aria-hidden="true">
            <span class="ui-interval__range"></span>
            <span class="ui-interval__point" style="--v: 0.14"></span>
          </span>
          <span class="ui-interval__bounds" aria-hidden="true">
            <span>8%</span>
            <span>24%</span>
          </span>
        </div>
      </div>
    </main>
  </body>
</html>
