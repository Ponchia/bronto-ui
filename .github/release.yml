changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Security
      labels:
        - security
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
    - title: DevOps & Release
      labels:
        - devops
        - ci
        - release
    - title: Documentation
      labels:
        - documentation
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - '*'
