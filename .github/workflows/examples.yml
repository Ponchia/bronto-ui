# Reusable consumer smoke: pack the real tarball and build every example
# against it (not a workspace symlink), so a broken published surface — bad
# exports map, missing file, unresolved subpath — fails here before a
# release can ship it. validate's check:pack only inspects the file
# allowlist; it does not build a consumer, so this is a distinct gate.
#
# Called by BOTH ci.yml and release.yml via `workflow_call` — one matrix
# definition, no drift between the merge path and the release path.
name: examples

on:
  workflow_call:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '10000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        example:
          [
            vanilla-vite,
            astro,
            sveltekit,
            vue-vite,
            react-vite,
            solid-vite,
            qwik-vite,
            tailwind-vite,
            report-static,
          ]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # cache: npm warms the global download cache across the matrix legs
      # (each leg installs vite/astro/etc. for its example).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Chromium for browser smoke
        if: contains(fromJSON('["vanilla-vite","sveltekit","vue-vite","react-vite","solid-vite","tailwind-vite","report-static"]'), matrix.example)
        run: npx playwright install --with-deps chromium

      - name: Build and smoke the ${{ matrix.example }} packed example
        run: npm run test:examples -- ${{ matrix.example }}
