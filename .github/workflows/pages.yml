# Publish the kitchen-sink demo to GitHub Pages so it's viewable online.
# Pure static deploy — the demo loads the committed runtime surface
# (css/fonts/dist/tokens/classes/behaviors) by relative path, so there
# is no build step. Never publishes npm or touches release.yml.
name: Pages

# Deploy only after CI (check + containerised e2e) has gone green on
# main — never publish a demo from a commit whose gates failed. (Was a
# bare push trigger, which could ship a broken/red-e2e demo; flagged in
# review.)
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Least privilege; deploy opts into exactly what Pages needs.
permissions:
  contents: read

# Never cancel an in-flight deploy; serialise Pages updates.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Manual dispatch always; the CI-completion trigger only when it
    # actually succeeded (workflow_run fires on failure too).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # configure-pages enablement
      # no id-token here: OIDC is only minted by deploy-pages in `deploy`.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Assemble static site (demo + runtime surface)
        run: |
          mkdir -p _site
          cp -r demo css dist fonts tokens classes behaviors _site/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8" />
          <meta http-equiv="refresh" content="0; url=./demo/" />
          <title>@ponchia/ui</title>
          <a href="./demo/">@ponchia/ui — demo</a>
          HTML

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
