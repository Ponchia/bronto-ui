# Publish the kitchen-sink demo to GitHub Pages so it's viewable online.
# Pure static deploy — the demo loads the committed runtime surface
# (css/fonts/dist/tokens/classes/behaviors) by relative path, so there
# is no build step. Never publishes npm or touches release.yml.
name: Pages

# Deploy only after CI (check + containerised e2e) has gone green on
# main — never publish a demo from a commit whose gates failed. (Was a
# bare push trigger, which could ship a broken/red-e2e demo; flagged in
# review.)
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Least privilege; deploy opts into exactly what Pages needs.
permissions:
  contents: read

# Never cancel an in-flight deploy; serialise Pages updates.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Manual dispatch always; the CI-completion trigger only when it
    # actually succeeded (workflow_run fires on failure too). Manual dispatch is
    # limited to main so Pages cannot publish an arbitrary un-gated ref.
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write # configure-pages enablement
      # no id-token here: OIDC is only minted by deploy-pages in `deploy`.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # workflow_run is allowed to deploy only protected main. Do not check
          # out the event SHA expression directly; verify it after checkout.
          ref: main
          persist-credentials: false

      - name: Verify Pages deploy target
        if: github.event_name == 'workflow_run'
        env:
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$CI_HEAD_SHA"

      - name: Assemble static site (demo + docs + runtime surface)
        run: |
          mkdir -p _site
          # docs/ ships the markdown viewer (docs/index.html) + the .md it renders.
          # llms.txt rides along so an LLM agent can read the entry doc straight
          # off the Pages origin, same as from the npm tarball.
          cp -r demo docs css dist fonts tokens classes behaviors _site/
          cp llms.txt _site/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>@ponchia/ui</title>
          <link rel="stylesheet" href="./dist/bronto.css" />
          <main class="ui-prose" style="max-width: 40rem; margin: 4rem auto; padding: 0 1.25rem">
            <h1>@ponchia/ui</h1>
            <p>A CSS-first design system for interfaces that explain themselves —
              works in plain HTML, every framework, and PDF, with no component runtime.
              A standard component set plus an opt-in analytical &amp; report layer
              (annotations, legends, connectors, data-viz, a static report grammar)
              for dashboards and LLM-authored reports. Monochrome with one rationed
              accent, re-skinnable from a single <code>--accent</code> knob.</p>
            <p>
              <a class="ui-button" href="./demo/">Live demo</a>
              <a class="ui-button ui-button--subtle" href="./demo/report-standalone.html">Static report</a>
              <a class="ui-button ui-button--subtle" href="./docs/">Documentation</a>
              <a class="ui-button ui-button--subtle" href="./demo/theme-playground.html">Theme playground</a>
            </p>
            <p class="ui-muted"><a href="https://github.com/Ponchia/bronto-ui">GitHub</a> ·
              <a href="https://www.npmjs.com/package/@ponchia/ui">npm</a> ·
              <a href="./llms.txt">llms.txt</a></p>
          </main>
          HTML

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
