# Reusable end-to-end gate: visual snapshots + axe a11y both themes +
# behavioural + forced-colors/reduced-motion/print + no-console-error/404,
# optionally across firefox/webkit (see `cross_engine`). Pinned to the
# container the committed baselines were authored in, so screenshots are
# byte-stable across machines (no cross-OS font flake).
#
# Called by BOTH ci.yml and release.yml via `workflow_call` — one
# definition, no drift. (These used to be two near-identical copies that
# had already diverged: CI had a registry-retry the release path lacked.)
# CI calls it chromium-only for cheap changes and cross-engine for risky PRs;
# release.yml calls it with cross_engine: true so the full firefox/webkit pass
# gates the publish.
name: e2e

on:
  workflow_call:
    inputs:
      cross_engine:
        description: >
          Run firefox + webkit too. Default false → chromium only (the
          pixel/visual + a11y + behaviour gate, the high-frequency
          regression surface, ~half the wall-clock). CI passes true for
          engine-sensitive PRs/main pushes; release.yml passes true so the
          cross-engine pass (the engine-specific `:has()`/`color-mix()`/
          `<dialog>`/`@starting-style` risk) gates the actual publish.
        type: boolean
        default: false

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

# Uniform npm network resilience for every npm invocation here (replaces
# the ad-hoc `npm ci || sleep && npm ci` shell retry — npm's own
# request-level retry is more robust and covers install AND build steps).
env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '10000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  run:
    runs-on: ubuntu-latest
    # Backstop so a hung browser/webServer can't burn a runner for the 6h
    # GitHub default. The suite itself is ~8 min.
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    # The job container runs as root but GitHub sets $HOME=/github/home
    # (uid 1001); Firefox refuses to launch unless $HOME is owned by the
    # current user. Documented Playwright-on-GHA workaround.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No `cache: npm` here on purpose: inside the pinned container the
      # setup-node npm cache never restores (the container's cache path
      # isn't pre-seeded), so it only added a wasted post-step tar. The
      # devDeps install in a few seconds regardless.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # chromium runs every spec including the pixel baselines; firefox +
      # webkit (the per-config NON_PIXEL set) only join when cross_engine.
      - name: Run e2e (${{ inputs.cross_engine && 'chromium + firefox + webkit' || 'chromium only' }})
        env:
          CROSS_ENGINE: ${{ inputs.cross_engine }}
        run: |
          if [ "$CROSS_ENGINE" = "true" ]; then
            npx playwright test
          else
            npx playwright test --project=chromium
          fi

      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
