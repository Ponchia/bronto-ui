# Validation only. Runs on every branch push and PR.
# This workflow NEVER publishes or creates a release — see release.yml,
# which is gated on `v*` tags. A push to main does not ship anything.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Stylelint + integrity checks (exports, tokens, classes, pack).
      - run: npm run check

      # node:test — pure modules + jsdom behavior tests.
      - run: npm test

  # Visual + a11y regression. Pinned to the same Playwright container the
  # committed baselines were authored in, so screenshots are byte-stable
  # across machines (no cross-OS font flake).
  visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - run: npx playwright test

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
