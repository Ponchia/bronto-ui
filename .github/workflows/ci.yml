# Validation only. Runs on every branch push and PR.
# This workflow NEVER publishes or creates a release — see release.yml,
# which is gated on `v*` tags. A push to main does not ship anything.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Stylelint + integrity checks (exports, tokens, classes, pack).
      - run: npm run check

      # node:test — pure modules + jsdom behavior tests.
      - run: npm test

  # End-to-end regression: visual snapshots (chromium) + axe a11y incl.
  # best-practice both themes + cross-engine firefox/webkit behavioural
  # + forced-colors/reduced-motion/print + no-console-error/404. Pinned
  # to the container the committed baselines were authored in, so
  # screenshots are byte-stable across machines (no cross-OS font flake).
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    # The job container runs as root but GitHub sets $HOME=/github/home
    # (uid 1001); Firefox refuses to launch unless $HOME is owned by the
    # current user. Documented Playwright-on-GHA workaround.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - run: npx playwright test

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
