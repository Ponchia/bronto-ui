# Validation only. Runs on every branch push and PR.
# This workflow NEVER publishes or creates a release — see release.yml,
# which is gated on `v*` tags. A push to main does not ship anything.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Stylelint + integrity checks (exports, tokens, classes, pack).
      - run: npm run check

      # node:test — pure modules + jsdom behavior tests.
      - run: npm test

  # Consumer smoke: pack the real tarball and build every example
  # against it (not a workspace symlink), so a broken published
  # surface — bad exports map, missing file, unresolved subpath —
  # fails here before a release can ship it.
  examples:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        example: [vanilla-vite, astro, sveltekit, react-vite, solid-vite, qwik-vite, report-static]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm ci

      # Pack the package exactly as a consumer would receive it.
      - run: npm pack

      - name: Build the ${{ matrix.example }} example from the tarball
        working-directory: examples/${{ matrix.example }}
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund --no-save "$GITHUB_WORKSPACE"/ponchia-ui-*.tgz
          npm run build

  # End-to-end regression: visual snapshots (chromium) + axe a11y incl.
  # best-practice both themes + cross-engine firefox/webkit behavioural
  # + forced-colors/reduced-motion/print + no-console-error/404. Pinned
  # to the container the committed baselines were authored in, so
  # screenshots are byte-stable across machines (no cross-OS font flake).
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    # The job container runs as root but GitHub sets $HOME=/github/home
    # (uid 1001); Firefox refuses to launch unless $HOME is owned by the
    # current user. Documented Playwright-on-GHA workaround.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - run: npx playwright test

      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
