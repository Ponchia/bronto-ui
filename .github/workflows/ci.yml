# Validation only. Runs on every PR, and on direct pushes to `main`.
#
# We deliberately do NOT also run on every branch push: a push and its PR
# fall in different `concurrency` groups (push ref `refs/heads/<branch>`
# vs PR ref `refs/pull/<n>/merge`), so each branch push with an open PR
# ran the WHOLE pipeline — e2e included — twice. PRs already cover feature
# branches; `main` pushes still run so a direct commit is validated and
# Pages can deploy from a green commit.
#
# This workflow NEVER publishes or creates a release — see release.yml,
# which is gated on `v*` tags. A push to main does not ship anything.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual full run: dispatch on any branch to exercise firefox + webkit
  # and the cross-browser packed examples before merging an engine-sensitive
  # CSS/behavior/consumer change. Keep this input-free so the build graph
  # cannot be altered by user parameters.
  workflow_dispatch:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Uniform npm network resilience across jobs (replaces the ad-hoc
# `npm ci || sleep && npm ci` retry — npm's own request-level retry is
# more robust and covers install AND build steps).
env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '10000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  # Detect Markdown/docs-only changes so the expensive cross-browser e2e (~8 min)
  # and the consumer-tarball example matrix are skipped when nothing but
  # Markdown docs changed. The docs viewer shell (`docs/index.html`) is app
  # code: it owns routing, sanitisation, and mobile nav, so it must still run
  # browser e2e. `check` ALWAYS runs — it has doc-scanning gates (check:report
  # validates docs use real classes; check:release validates the CHANGELOG).
  # Self-contained git diff (no third-party action, in keeping with the repo's
  # SHA-pinned/zero-extra-deps posture) and FAILS SAFE: any uncertainty
  # (empty/unknown range, first push, force-push) → heavy=true → full pipeline.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      heavy: ${{ steps.detect.outputs.heavy }}
      engine_sensitive: ${{ steps.detect.outputs.engine_sensitive }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            files="$(git diff --name-only "$BASE_SHA"...HEAD || true)"
          elif [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            files="$(git diff --name-only "$BEFORE_SHA" HEAD || true)"
          else
            files=""   # unknown range → fail safe below
          fi
          # Only declare a Markdown/docs-only change when the diff is
          # NON-EMPTY and EVERY path is Markdown or LICENSE; empty/unknown →
          # heavy=true (run everything). `docs/index.html` is executable docs
          # app code, not cheap prose, so it intentionally falls through to
          # heavy=true. (Uses string emptiness, not `grep -q` exit codes —
          # those differ BSD vs GNU.)
          heavy=true
          if [ -n "$files" ]; then
            nondoc="$(printf '%s\n' "$files" | grep -vE '(\.md$|^LICENSE$)' || true)"
            [ -z "$nondoc" ] && heavy=false
          fi
          # Engine-sensitive = the change touches rendered CSS, behaviors,
          # fonts, the docs viewer app shell, or the e2e suite itself — the
          # surfaces where firefox/webkit can break while chromium stays green
          # (`:has()`, `color-mix()`, `-webkit-` prefixes …). Drives the
          # cross-engine pass on pushes to main, so an engine-specific defect
          # is caught at merge time instead of days later at the release tag
          # (the exact failure mode that burned v0.6.1/v0.6.2). Same fail-safe
          # stance: unknown diff → true.
          engine_sensitive=true
          if [ -n "$files" ]; then
            engine="$(printf '%s\n' "$files" | grep -E '^(css/|dist/|behaviors/|fonts/|tokens/|test/e2e/|docs/index\.html|playwright\.config\.mjs)' || true)"
            [ -z "$engine" ] && engine_sensitive=false
          fi
          echo "Changed files:"; printf '%s\n' "$files"
          echo "heavy=$heavy engine_sensitive=$engine_sensitive"
          echo "heavy=$heavy" >> "$GITHUB_OUTPUT"
          echo "engine_sensitive=$engine_sensitive" >> "$GITHUB_OUTPUT"

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Stylelint + integrity checks + node:test unit/contract suite.
      - run: npm run check

  # Consumer smoke + end-to-end regression, defined ONCE as reusable
  # workflows and shared with release.yml so the release path can't drift
  # from what every PR runs. Skipped on docs-only changes (see `changes`).
  examples:
    needs: [check, changes]
    if: needs.changes.outputs.heavy == 'true'
    uses: ./.github/workflows/examples.yml
    with:
      cross_browser: ${{ github.event_name == 'workflow_dispatch' }}
      visual_smoke: ${{ github.event_name == 'workflow_dispatch' }}

  # chromium-only on PRs for fast feedback. Pushes to main run the full
  # firefox/webkit pass too when the change touches an engine-sensitive
  # surface (css/dist/behaviors/fonts/tokens/e2e) — cross-engine-only-at-
  # tag-time is how a deterministic WebKit defect merged green and then
  # burned two release attempts (v0.6.1/v0.6.2). Manual workflow_dispatch
  # always runs the cross-engine pass as the any-branch escape hatch.
  e2e:
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    uses: ./.github/workflows/e2e.yml
    with:
      cross_engine: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.changes.outputs.engine_sensitive == 'true') }}

  # Single aggregating gate — the ONLY required status check on `main`.
  # Requiring individual matrix legs by name (`examples (qwik-vite)` …) is
  # fragile: every added/renamed leg needs a manual branch-protection
  # edit, and a forgotten one silently drops coverage (this is exactly how
  # qwik-vite and report-static ended up NOT required). This job depends on
  # the whole matrix, so leg changes never touch branch protection again.
  # `if: always()` so it still reports when an upstream was skipped
  # (docs-only) or failed; a skip counts as pass, a real failure does not.
  ci-gate:
    if: always()
    needs: [check, examples, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every CI job to have passed (or been skipped)
        env:
          R_CHECK: ${{ needs.check.result }}
          R_EXAMPLES: ${{ needs.examples.result }}
          R_E2E: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail
          echo "check=$R_CHECK examples=$R_EXAMPLES e2e=$R_E2E"
          for r in "$R_CHECK" "$R_EXAMPLES" "$R_E2E"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required CI job did not pass (got '$r')"
              exit 1
            fi
          done
          echo "All required CI jobs passed (or were skipped on a docs-only change)."
