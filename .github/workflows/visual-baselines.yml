# Regenerate the Playwright visual baselines in the EXACT pinned
# container CI uses, so the committed PNGs match CI rasterisation
# (cross-OS rendering differs — they can't be authored on a dev mac).
# Manually dispatched after an intentional visual change. `main` is
# protected, so this OPENS A PR with the regenerated baselines (it does
# not push to main); the PR's own check + e2e then validate them.
name: Update visual baselines

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      HOME: /root # same Firefox-on-GHA workaround as ci.yml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Only the chromium pixel specs own baselines (per playwright.config).
      - run: npx playwright test test/e2e/visual.spec.mjs --project=chromium --update-snapshots

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: test/e2e/__screenshots__/
          retention-days: 14

  open-pr:
    needs: regen
    runs-on: ubuntu-latest # gh CLI is preinstalled here, not in the Playwright image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: visual-baselines
          path: test/e2e/__screenshots__/

      - name: Open a PR with the regenerated baselines
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- test/e2e/__screenshots__; then
            echo "Baselines unchanged — nothing to do."
            exit 0
          fi
          BRANCH="chore/visual-baselines-${GITHUB_RUN_ID}"
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add test/e2e/__screenshots__
          git commit -m "test(e2e): regenerate visual baselines in the pinned container"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "test(e2e): regenerate visual baselines" \
            --body "Automated: pixel baselines re-rendered in \`mcr.microsoft.com/playwright:v1.60.0-jammy\` (run ${GITHUB_RUN_ID}). Merge once \`check\` + \`e2e\` are green."
