# Regenerate the Playwright visual baselines in the EXACT pinned
# container CI uses, so the committed PNGs match CI rasterisation
# (cross-OS rendering differs — they cannot be authored on a dev mac).
# Manually dispatched: run it from the branch whose baselines you want
# rebuilt (e.g. after an intentional visual change); it commits the
# regenerated screenshots back to that branch, so the next CI run's
# `e2e` job goes green on its own.
name: Update visual baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      HOME: /root # same Firefox-on-GHA workaround as ci.yml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Only the chromium pixel specs own baselines (per playwright.config).
      - run: npx playwright test test/e2e/visual.spec.mjs --project=chromium --update-snapshots

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: test/e2e/__screenshots__/
          retention-days: 14

      - name: Commit regenerated baselines to the branch
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- test/e2e/__screenshots__; then
            echo "Baselines unchanged — nothing to commit."
            exit 0
          fi
          git add test/e2e/__screenshots__
          git commit -m "test(e2e): regenerate visual baselines in pinned container [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
