# Regenerate the Playwright visual baselines in the EXACT pinned
# container CI uses, so the committed PNGs match CI rasterisation
# (cross-OS rendering differs — they can't be authored on a dev mac).
# Manually dispatched after an intentional visual change. `main` is
# protected, so this OPENS A PR with the regenerated baselines (it does
# not push to main); the PR's own check + e2e then validate them.
#
# TOKEN: a PR opened by the default GITHUB_TOKEN does NOT trigger
# `check`/`e2e` (GitHub anti-recursion), so it would sit permanently
# BLOCKED and need an --admin merge. Set repo secret `BASELINE_PAT`
# (a fine-grained PAT or GitHub App token with contents:write +
# pull-requests:write) and the bot PR runs CI like any other and is
# normally mergeable. Without it this falls back to GITHUB_TOKEN (the
# legacy behaviour) — still functional, just admin-merge-only.
#
# CRUFT: an abandoned run leaves a `chore/visual-baselines-*` branch
# (delete_branch_on_merge only reaps MERGED ones). This workflow now
# self-prunes prior orphans on each run; cleanup.yml is the scheduled
# backstop.
name: Update visual baselines

on:
  workflow_dispatch:

# Least privilege: read-only by default; only the open-pr job elevates to
# the writes it needs. regen just renders + uploads an artifact (Scorecard
# Token-Permissions / least-privilege).
permissions:
  contents: read

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      HOME: /root # same Firefox-on-GHA workaround as ci.yml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Only the chromium pixel specs own baselines (per playwright.config).
      - run: npx playwright test test/e2e/visual.spec.mjs --project=chromium --update-snapshots

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: test/e2e/__screenshots__/
          retention-days: 14

  open-pr:
    needs: regen
    runs-on: ubuntu-latest # gh CLI is preinstalled here, not in the Playwright image
    timeout-minutes: 10
    permissions:
      contents: write # push the chore/visual-baselines-* branch
      pull-requests: write # open the baseline PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The branch the workflow was dispatched on (default `main`). The
          # baseline PR is opened against this same branch, so an intentional
          # visual change on a feature branch can regenerate its own baselines
          # (regen renders that branch's CSS) — not just post-merge on main.
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: visual-baselines
          path: test/e2e/__screenshots__/

      - name: Open a PR with the regenerated baselines
        shell: bash
        # Prefer a real token so the PR triggers check/e2e; fall back to
        # GITHUB_TOKEN (admin-merge-only) if BASELINE_PAT is unset.
        env:
          GH_TOKEN: ${{ secrets.BASELINE_PAT || github.token }}
          BASELINE_PAT: ${{ secrets.BASELINE_PAT }}
          BASE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Stage first so the change-check sees brand-NEW baselines too:
          # a new component yields untracked <slug>-<theme>.png files, and
          # plain `git diff` is blind to untracked paths (it only compares
          # tracked files) — so it would falsely report "nothing to do" on
          # exactly the case this workflow exists for. `git diff --cached`
          # after staging catches additions, deletions and modifications.
          git add -A -- test/e2e/__screenshots__
          if git diff --cached --quiet -- test/e2e/__screenshots__; then
            echo "Baselines unchanged — nothing to do."
            exit 0
          fi

          # Self-prune: drop any prior chore/visual-baselines-* branch
          # that no longer has an open PR, so abandoned runs don't pile
          # up (cleanup.yml is the scheduled backstop).
          mapfile -t stale < <(
            git ls-remote --heads origin 'refs/heads/chore/visual-baselines-*' \
              | sed 's#.*refs/heads/##'
          )
          for b in "${stale[@]:-}"; do
            [ -z "$b" ] && continue
            if [ "$(gh pr list --head "$b" --state open --json number --jq 'length')" = "0" ]; then
              echo "Pruning orphan branch $b"
              git push origin --delete "$b" || true
            fi
          done

          BRANCH="chore/visual-baselines-${GITHUB_RUN_ID}"
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add test/e2e/__screenshots__
          git commit -m "test(e2e): regenerate visual baselines in the pinned container"
          git push origin "$BRANCH"

          # Be explicit about the merge expectation so a future
          # maintainer is never confused: with BASELINE_PAT the PR runs
          # CI and auto-merges; without it, `main` protection
          # (enforce_admins=true) means it CANNOT merge — abandon it and
          # cleanup.yml/self-prune will reap it. The clean-e2e pattern
          # (keep demo/ untouched) avoids needing this workflow at all.
          if [ -n "${BASELINE_PAT:-}" ]; then
            note="✅ Opened with BASELINE_PAT — \`check\`/\`e2e\` will run; enable auto-merge to land it."
          else
            note="⚠️ Opened with the default GITHUB_TOKEN, so \`check\`/\`e2e\` will NOT run and \`main\` protection makes this **unmergeable**. This is expected — close it (cleanup.yml reaps it automatically). To make baseline regen mergeable, add a \`BASELINE_PAT\` secret, or just use the clean-e2e pattern and never run this workflow."
          fi
          gh pr create --base "$BASE_REF" --head "$BRANCH" \
            --title "test(e2e): regenerate visual baselines" \
            --body "Automated: pixel baselines re-rendered in \`mcr.microsoft.com/playwright:v1.60.0-jammy\` (run ${GITHUB_RUN_ID}).

          $note"
          echo "$note" >> "$GITHUB_STEP_SUMMARY"
