# Release is tag-driven and explicit. It triggers ONLY on a pushed
# `v*` tag — never on a branch or main push. Cutting a release is a
# deliberate `git tag vX.Y.Z && git push --tags`, not a side effect of
# merging to main.
#
# GATING: the npm publish IS the gate for the documented install path.
# `validate` runs read-only checks + tag ancestry/version matches;
# `publish-preflight` records the pack manifest/size after all gates; and
# `publish-npm` only runs after a protected-environment approval, so a failing
# check means the version is never on npm and consumers never resolve it.
# (GitHub still serves the raw tag tarball `archive/refs/tags/vX.Y.Z.tar.gz`
# for any tag, ungated — that path is legacy/fallback, not the documented
# install; see docs/architecture.md.)
#
# The e2e + examples gates are the SAME reusable workflows ci.yml runs
# (.github/workflows/{e2e,examples}.yml) — one definition, never a drifted
# copy. The release runs them at full strength: examples is identical, and
# e2e adds the firefox/webkit cross-engine pass that PRs skip for speed —
# so the publish is gated on cross-engine green even though merges aren't.
#
# DIST-TAG ROUTING: a stable tag (`v0.4.0`) publishes to `latest`, so
# `npm i @ponchia/ui` resolves it. A SemVer prerelease tag (`v0.4.0-rc.1`,
# anything with a hyphenated identifier) publishes to `next` instead —
# consumers opt in with `@ponchia/ui@next` and `latest` never silently
# moves onto an unstable build. The GitHub Release is flagged prerelease
# to match. publish-npm derives this from the tag; nothing else to set.
#
# Requires the NPM_TOKEN secret (npm automation token for the @ponchia
# scope) scoped to the `npm-publish` Environment — see publish-npm — plus
# a committed LICENSE file before the first successful publish.
name: Release

on:
  push:
    tags: ['v*']

# Default read-only. Each job opts into exactly the scope it needs.
permissions:
  contents: read

# Serialize releases. Two tags pushed close together must not race the
# `latest`/`next` dist-tag pointer (last-writer-wins). Never cancel an
# in-flight release — a half-finished publish is worse than a queue.
concurrency:
  group: release-publish
  cancel-in-progress: false

# Uniform npm network resilience (matches ci.yml).
env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '10000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::release tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not reachable from origin/main"
            exit 1
          fi

      - run: npm ci

      - run: npm run check

      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

  # Reused, not re-implemented (these jobs used to be duplicated here and
  # had drifted — the release copies lacked the registry retry CI had).
  # publish-preflight needs these; a release must not skip what merge-to-main
  # runs, and adds the cross-engine e2e pass PRs defer.
  e2e:
    needs: validate
    # Full cross-engine pass gates the publish — PRs run chromium-only for
    # speed, so the release is where firefox/webkit must go green.
    uses: ./.github/workflows/e2e.yml
    with:
      cross_engine: true

  examples:
    needs: validate
    uses: ./.github/workflows/examples.yml

  publish-preflight:
    needs: [validate, e2e, examples]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Capture publish preflight summary
        run: |
          set -euo pipefail
          npm pack --dry-run --json --ignore-scripts > "${RUNNER_TEMP}/pack.json"
          npm run size:report > "${RUNNER_TEMP}/size-report.txt"
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const path = require('node:path');
          const tmp = process.env.RUNNER_TEMP;
          const pack = JSON.parse(fs.readFileSync(path.join(tmp, 'pack.json'), 'utf8'))[0];
          const size = fs.readFileSync(path.join(tmp, 'size-report.txt'), 'utf8').trim();
          console.log('## Publish preflight');
          console.log('');
          console.log(`Package: ${pack.name}@${pack.version}`);
          console.log(`Files: ${pack.files.length}`);
          console.log(`Packed size: ${pack.size} bytes`);
          console.log(`Unpacked size: ${pack.unpackedSize} bytes`);
          console.log('');
          console.log('### Size report');
          console.log('');
          console.log('```text');
          console.log(size);
          console.log('```');
          console.log('');
          console.log('### Pack manifest');
          console.log('');
          for (const file of pack.files) console.log(`- ${file.path} (${file.size} B)`);
          NODE

  publish-npm:
    needs: publish-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Manual approval gate: this job is the ONLY thing that reaches npm, so
    # it runs in the `npm-publish` Environment (required-reviewer protection
    # rule). After the gates and preflight pass, the run pauses here until a
    # maintainer approves in the Actions UI — a deliberate guard against an
    # accidental tag push publishing. NPM_TOKEN is an Environment secret here,
    # so no other job (or future workflow) can read it.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # npm provenance (publishConfig.provenance)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Publish with --ignore-scripts so NODE_AUTH_TOKEN is never exposed
      # to the prepack/prepublishOnly lifecycle (the whole check+test+build
      # surface + devDeps). Safe because the committed artifacts were
      # already byte-verified by `validate` and summarized by
      # `publish-preflight` on this exact commit — so we ship exactly what
      # was validated, not a re-build. prepublishOnly stays the intrinsic
      # guard for any non-CI/manual publish.
      #
      # --tag is explicit on both paths: a bare `npm publish` defaults to
      # `latest`, so a prerelease would otherwise hijack the default
      # install. We route prereleases to `next` instead (see header).
      - name: Publish to npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          # A hyphen marks a SemVer prerelease identifier (0.4.0-rc.1);
          # ${version%%-*} strips it, so an unchanged value means stable.
          if [ "$version" != "${version%%-*}" ]; then
            dist_tag=next
          else
            dist_tag=latest
          fi
          echo "Publishing $version to dist-tag '$dist_tag'"
          npm publish --ignore-scripts --tag "$dist_tag"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Record npm registry state
        continue-on-error: true
        run: |
          set -uo pipefail
          version="${GITHUB_REF_NAME#v}"
          view_ok=false
          for i in 1 2 3 4 5; do
            if npm view "@ponchia/ui@$version" version dist.integrity dist.tarball --json > "${RUNNER_TEMP}/npm-view.json"; then
              view_ok=true
              break
            fi
            sleep 5
          done
          tags_ok=false
          if npm view @ponchia/ui dist-tags --json > "${RUNNER_TEMP}/npm-dist-tags.json"; then
            tags_ok=true
          fi

          {
            echo ''
            echo '## npm registry state'
            echo ''
            if [ "$view_ok" = true ] && [ "$tags_ok" = true ]; then
              node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const tmp = process.env.RUNNER_TEMP;
          const view = JSON.parse(fs.readFileSync(path.join(tmp, 'npm-view.json'), 'utf8'));
          const tags = JSON.parse(fs.readFileSync(path.join(tmp, 'npm-dist-tags.json'), 'utf8'));
          console.log('```json');
          console.log(JSON.stringify({ published: view, distTags: tags }, null, 2));
          console.log('```');
          NODE
            else
              echo '> npm publish completed, but the post-publish registry observation did not return a complete response.'
              echo ''
              echo "- package lookup: $view_ok"
              echo "- dist-tag lookup: $tags_ok"
              echo ''
              echo 'Verify manually with `npm view @ponchia/ui version dist-tags --json`.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-notes:
    # Gate on a successful publish — never announce a GitHub Release for
    # a version that failed to reach npm (no split-brain). publish-npm itself
    # needs publish-preflight, which needs [validate, e2e, examples], so the
    # gate is transitive.
    needs: publish-npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # contents:write is for the Release API, not git — don't leave a
      # usable git credential on disk for the action to inherit.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The Release body IS the curated, narrative CHANGELOG section for this
      # tag — not GitHub's auto-generated PR list. One source of truth
      # (CHANGELOG.md), surfaced where users read it.
      - name: Extract the CHANGELOG section for this tag
        # Route github.ref_name through env, never inline into the shell, so a
        # crafted tag name can't break out of the command (semgrep ERROR; the
        # tag is maintainer-controlled, but env-routing is the safe idiom).
        env:
          REF_NAME: ${{ github.ref_name }}
        run: node scripts/changelog-section.mjs "$REF_NAME" > "${RUNNER_TEMP}/release-body.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: ${{ runner.temp }}/release-body.md
          # Flag prerelease tags (hyphenated SemVer) so the GitHub Release
          # matches the `next` dist-tag and is not surfaced as "Latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
