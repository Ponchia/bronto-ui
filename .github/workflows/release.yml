# Release is tag-driven and explicit. It triggers ONLY on a pushed
# `v*` tag — never on a branch or main push. Cutting a release is a
# deliberate `git tag vX.Y.Z && git push --tags`, not a side effect of
# merging to main.
#
# IMPORTANT: this workflow does NOT gate the installable artifact.
# Consumers resolve GitHub's auto-generated source tarball
# (archive/refs/tags/vX.Y.Z.tar.gz), which GitHub creates for ANY pushed
# tag the instant it exists — independent of, and before, this workflow.
# So a failing check here does not prevent a bad tag from being
# installable. The real safeguard is process: only tag from a green
# main. This job re-runs the checks and the version match as a loud
# post-tag tripwire and publishes a GitHub Release for visibility; it is
# not a hard gate. For a true gate, use protected tags or a release
# branch (see docs/architecture.md).
name: Release

on:
  push:
    tags: ['v*']

# Default to read-only; only the publish job is granted write, and only
# after validation passes. The npm ci / check steps never see a write token.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
