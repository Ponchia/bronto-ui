# Release is tag-driven and explicit. It triggers ONLY on a pushed
# `v*` tag — never on a branch or main push. Cutting a release is a
# deliberate `git tag vX.Y.Z && git push --tags`, not a side effect of
# merging to main.
#
# GATING: the npm publish IS the gate for the documented install path.
# `validate` runs read-only checks + the tag↔version match; `publish-npm`
# only runs if validate passes, so a failing check means the version is
# never on npm and consumers never resolve it. (GitHub still serves the
# raw tag tarball `archive/refs/tags/vX.Y.Z.tar.gz` for any tag,
# ungated — that path is legacy/fallback, not the documented install;
# see docs/architecture.md.)
#
# Requires repo secret NPM_TOKEN (npm automation token for the @ponchia
# scope) and a committed LICENSE file before the first successful publish.
name: Release

on:
  push:
    tags: ['v*']

# Default read-only. Each job opts into exactly the scope it needs.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

  # Same e2e gate as CI (visual snapshots + axe a11y both themes +
  # cross-engine firefox/webkit + forced-colors/print modes), pinned to
  # the baseline container. publish-npm needs this too — a release must
  # not skip what every branch push runs.
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    # Firefox needs $HOME owned by the run user; GHA sets /github/home.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - run: npx playwright test

  publish-npm:
    needs: [validate, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance (publishConfig.provenance)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-notes:
    # Gate on a successful publish — never announce a GitHub Release for
    # a version that failed to reach npm (no split-brain). publish-npm
    # itself needs [validate, visual], so the gate is transitive.
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
