version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (security: pinned by SHA
  # means no automatic upstream updates, so Dependabot owns the bumps).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']

  # Dev-only npm deps (the package itself ships zero runtime deps).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev:
        patterns: ['*']
    ignore:
      # @playwright/test must stay in lockstep with the pinned
      # mcr.microsoft.com/playwright container image (visual baselines
      # are rasterised there) — bump both together, by hand, never
      # silently via Dependabot.
      - dependency-name: '@playwright/test'
      - dependency-name: '@axe-core/playwright'
      # examples/* are disposable, illustrative consumer apps — NOT part
      # of the published package (zero runtime deps; examples excluded
      # from the tarball) and rebuilt from scratch in CI. Their build
      # toolchain is not a security surface for @ponchia/ui consumers,
      # so don't let Dependabot churn (or break, cf. the vite 5→8 jump
      # in #15) the demo scaffolding. Bump these by hand if a demo
      # genuinely needs it.
      - dependency-name: 'vite'
      - dependency-name: 'astro'
      - dependency-name: 'svelte'
      - dependency-name: '@sveltejs/kit'
      - dependency-name: '@sveltejs/adapter-static'
      - dependency-name: '@sveltejs/vite-plugin-svelte'
