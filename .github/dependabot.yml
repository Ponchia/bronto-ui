version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (security: pinned by SHA
  # means no automatic upstream updates, so Dependabot owns the bumps).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']

  # Dev-only npm deps (the package itself ships zero runtime deps).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev:
        patterns: ['*']
